<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Vamos Aprender! 🦉</title>

  <!-- PWA / mobile -->
  <meta name="theme-color" content="#667eea">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vamos Aprender!">

  <!-- SEO / social -->
  <meta name="description" content="Jogo educativo de perguntas para crianças de 4 a 6 anos. Voz em português, flashcards com emoji e celebrações animadas.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <canvas id="confetti-canvas"></canvas>
  <div id="celebration-overlay"></div>

  <!-- Menu do livro: fixo, visível em qualquer tela -->
  <button id="btn-book" aria-label="Menu" data-i18n-aria="btnBookAria">📖</button>
  <div id="book-menu">
    <button id="menu-back"  data-i18n="menuBack">Voltar</button>
    <button id="menu-album" data-i18n="menuAlbum">Álbum</button>
    <button id="menu-home"  data-i18n="menuHome">Início</button>
    <button id="menu-exit"  data-i18n="menuExit">Sair</button>
  </div>

  <!-- Overlay de vídeo: entrega da moeda / revelação de badge -->
  <div id="video-overlay">
    <video id="video-overlay-player" playsinline></video>
    <div id="video-overlay-fallback"></div>
    <div id="video-overlay-grain"></div>
  </div>

  <!-- TELA 0: Idioma -->
  <div id="screen-language" class="screen active">
    <div class="screen-card">
      <div class="title-emoji">🌍</div>
      <h1 data-i18n="title">Vamos Aprender!</h1>
      <p class="subtitle" data-i18n="pickLanguage">Escolha o idioma / Choose your language</p>
      <div class="flag-row">
        <button id="btn-lang-pt" class="flag-btn" aria-label="Português (Brasil)">🇧🇷</button>
        <button id="btn-lang-en" class="flag-btn" aria-label="English (US)">🇺🇸</button>
      </div>
    </div>
  </div>

  <!-- TELA 1: Nome -->
  <div id="screen-name" class="screen">
    <div class="screen-card">
      <div class="title-emoji">🦄</div>
      <h1 data-i18n="title">Vamos Aprender!</h1>
      <p class="subtitle" data-i18n="nameSubtitle">Qual é o seu nome?</p>
      <input id="name-input" type="text" data-i18n-placeholder="namePlaceholder" placeholder="Digite seu nome..." maxlength="20" autocomplete="off" spellcheck="false">
      <button id="btn-start" class="btn-primary" data-i18n="btnStart" disabled>Começar! 🚀</button>
    </div>
  </div>

  <!-- TELA 2: Boas-vindas -->
  <div id="screen-welcome" class="screen">
    <div class="screen-card">
      <div class="title-emoji">🌟</div>
      <h1 id="welcome-msg">Olá!</h1>
      <p class="subtitle" data-i18n="welcomeSubtitle">Pronto para aprender coisas incríveis?</p>
      <div class="coin-balance">🪙 <span class="coin-count">0</span></div>
      <p class="album-hint" data-i18n="albumHint">A cada 3 moedas você ganha uma figurinha. Complete seu álbum!</p>
      <div class="preview-stars">⭐⭐⭐</div>
      <button id="btn-play" class="btn-primary" data-i18n="btnPlay">Jogar! 🎮</button>
    </div>
  </div>

  <!-- TELA 3: Jogo -->
  <div id="screen-playing" class="screen">
    <div class="playing-layout">

      <div class="top-bar">
        <span id="q-progress">1 / 10</span>
        <span class="coin-balance">🪙 <span class="coin-count">0</span></span>
        <span id="q-score">✅ 0</span>
      </div>

      <div class="question-box">
        <button id="btn-repeat" data-i18n-aria="btnRepeatAria" aria-label="Repetir pergunta">🔊</button>
        <p id="question-text">...</p>
      </div>

      <div id="cards-grid">
        <button class="card" data-idx="0">
          <span class="card-emoji"></span>
          <img class="card-image" alt="" hidden>
          <span class="card-label"></span>
        </button>
        <button class="card" data-idx="1">
          <span class="card-emoji"></span>
          <img class="card-image" alt="" hidden>
          <span class="card-label"></span>
        </button>
        <button class="card" data-idx="2">
          <span class="card-emoji"></span>
          <img class="card-image" alt="" hidden>
          <span class="card-label"></span>
        </button>
        <button class="card" data-idx="3">
          <span class="card-emoji"></span>
          <img class="card-image" alt="" hidden>
          <span class="card-label"></span>
        </button>
      </div>

      <div id="feedback-text" class="feedback-text"></div>

    </div>
  </div>

  <!-- TELA 4: Resultado -->
  <div id="screen-results" class="screen">
    <div class="screen-card">
      <div id="result-stars" class="result-stars"></div>
      <h1 id="result-title"></h1>
      <p id="result-subtitle" class="subtitle"></p>
      <div class="coin-balance">🪙 <span class="coin-count">0</span></div>
      <button id="btn-replay" class="btn-primary" data-i18n="btnReplay">Jogar de novo! 🔄</button>
      <button id="btn-exit" class="btn-secondary" data-i18n="btnExit">Sair 👋</button>
    </div>
  </div>

  <!-- TELA 5: Álbum de figurinhas -->
  <div id="screen-album" class="screen">
    <div class="screen-card album-card">
      <div class="title-emoji">📖</div>
      <h1 data-i18n="albumTitle">Meu Álbum de Figurinhas</h1>
      <p class="subtitle" id="album-progress-text">0 / 26 selos</p>
      <div id="album-grid" class="album-grid"></div>
      <button id="btn-album-close" class="btn-secondary" data-i18n="btnClose">Fechar</button>
    </div>
  </div>

  <script src="js/questions.js"></script>
  <script src="js/questions.en.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
